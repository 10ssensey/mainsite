<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>tenssense · Анкета</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@800;900&family=Onest:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0d1a26;--canvas:#f4f0e8;--surface:#fff;--primary:#d8ff3d;
  --ink2:#3d4a55;--ink3:#6a7480;--line:rgba(13,26,38,0.12);
  --clay:#d45d2e;--positive:#2f6b3a;--positive-pale:#e1efe3;
  --negative:#c5302f;--negative-pale:#fadcdc;
}
body{font-family:'Onest',sans-serif;color:var(--ink)}

/* TRIGGER */
.ts-trigger{
  display:inline-flex;align-items:center;gap:8px;
  font-family:'Onest',sans-serif;font-size:15px;font-weight:600;
  color:var(--ink);background:var(--primary);
  border:none;border-radius:999px;padding:14px 28px;
  cursor:pointer;transition:background .18s;
}
.ts-trigger:hover{background:#e3ff66}

/* OVERLAY */
.ts-overlay{
  position:fixed;inset:0;z-index:99999;
  background:rgba(13,26,38,.72);
  display:flex;align-items:center;justify-content:center;
  padding:16px;
  opacity:0;pointer-events:none;
  transition:opacity .25s;
}
.ts-overlay.open{opacity:1;pointer-events:auto}

/* MODAL */
.ts-modal{
  background:var(--canvas);border-radius:20px;
  width:100%;max-width:520px;max-height:92vh;
  overflow:hidden;display:flex;flex-direction:column;
  transform:translateY(24px);
  transition:transform .3s cubic-bezier(.22,1,.36,1);
}
.ts-overlay.open .ts-modal{transform:translateY(0)}

/* PROGRESS */
.ts-progress{height:4px;background:var(--line);flex-shrink:0}
.ts-progress-fill{height:100%;background:var(--primary);transition:width .35s cubic-bezier(.22,1,.36,1)}

/* HEADER */
.ts-header{
  background:var(--ink);padding:22px 28px 20px;flex-shrink:0;
  position:relative;overflow:hidden;
}
.ts-header::before{
  content:'';position:absolute;inset:0;opacity:.14;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 520 88' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='16' y='8' width='488' height='72' fill='none' stroke='%23d8ff3d' stroke-width='1.5'/%3E%3Cline x1='36' y1='8' x2='36' y2='80' stroke='%23d8ff3d' stroke-width='1'/%3E%3Cline x1='484' y1='8' x2='484' y2='80' stroke='%23d8ff3d' stroke-width='1'/%3E%3Cline x1='260' y1='8' x2='260' y2='80' stroke='%23d8ff3d' stroke-width='2'/%3E%3C/svg%3E") center/cover;
}
.ts-header-top{display:flex;align-items:center;justify-content:space-between;position:relative;margin-bottom:10px}
.ts-eyebrow{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--primary)}
.ts-close{
  background:rgba(244,240,232,.1);border:none;border-radius:50%;
  width:32px;height:32px;cursor:pointer;color:#f4f0e8;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;flex-shrink:0;
}
.ts-close:hover{background:rgba(244,240,232,.2)}
.ts-counter{
  font-family:'Unbounded',sans-serif;font-weight:900;font-size:26px;
  color:#f4f0e8;line-height:1;position:relative;
}
.ts-counter em{color:var(--primary);font-style:normal}

/* BODY */
.ts-body{padding:22px 28px 8px;overflow-y:auto;flex:1}
.ts-question{
  font-family:'Unbounded',sans-serif;font-weight:800;
  font-size:15px;letter-spacing:-.02em;line-height:1.35;
  color:var(--ink);margin-bottom:18px;
}
.ts-hint{font-size:11px;color:var(--ink3);margin-bottom:14px;margin-top:-10px}

/* OPTIONS */
.ts-opts{display:flex;flex-direction:column;gap:8px}
.ts-opt{
  display:flex;align-items:center;gap:14px;
  padding:13px 18px;background:var(--surface);
  border:1.5px solid var(--line);border-radius:12px;
  cursor:pointer;transition:all .15s;
  font-size:14px;font-weight:500;color:var(--ink);text-align:left;
  width:100%;
}
.ts-opt:hover{border-color:rgba(13,26,38,.35);background:#fafaf8}
.ts-opt.selected{border-color:var(--ink);background:var(--ink);color:#f4f0e8}
.ts-opt.selected .ts-marker{background:var(--primary);border-color:var(--primary);color:var(--ink)}
.ts-marker{
  width:22px;height:22px;border-radius:50%;flex-shrink:0;
  border:1.5px solid var(--line);background:var(--canvas);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;font-family:'Unbounded',sans-serif;
  transition:all .15s;
}
.ts-opt.multi .ts-marker{border-radius:6px}

/* AGE INPUT */
.ts-age-wrap{display:flex;align-items:center;gap:12px}
.ts-age-input{
  background:var(--surface);border:1.5px solid var(--line);
  border-radius:12px;padding:13px 18px;
  font-family:'Onest',sans-serif;font-size:16px;font-weight:600;
  color:var(--ink);width:110px;outline:none;transition:border .15s;
}
.ts-age-input:focus{border-color:var(--ink)}
.ts-age-lbl{font-size:13px;color:var(--ink3)}

/* CONTACT FORM (step 11) */
.ts-contact-form{display:flex;flex-direction:column;gap:12px}
.ts-field-label{font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:4px;display:block}
.ts-field-wrap{display:flex;flex-direction:column;gap:4px}
.ts-field{
  background:var(--surface);border:1.5px solid var(--line);
  border-radius:12px;padding:13px 18px;
  font-family:'Onest',sans-serif;font-size:15px;font-weight:500;
  color:var(--ink);width:100%;outline:none;transition:border .15s;
}
.ts-field:focus{border-color:var(--ink)}
.ts-field.error{border-color:var(--negative)!important}
.ts-field-err{font-size:11px;color:var(--negative);display:none}
.ts-field-err.show{display:block}
.ts-privacy{font-size:11px;color:var(--ink3);line-height:1.5;margin-top:4px}
.ts-privacy a{color:var(--ink3)}

/* FOOTER */
.ts-footer{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 28px 22px;flex-shrink:0;
}
.ts-btn-back{
  font-family:'Onest',sans-serif;font-size:13px;font-weight:600;
  color:var(--ink3);background:transparent;border:none;cursor:pointer;
  padding:8px 0;
}
.ts-btn-next{
  font-family:'Onest',sans-serif;font-size:14px;font-weight:600;
  color:var(--ink);background:var(--primary);
  border:none;border-radius:999px;padding:12px 24px;
  cursor:pointer;display:flex;align-items:center;gap:6px;
  transition:background .15s;
}
.ts-btn-next:disabled{background:var(--line);color:var(--ink3);cursor:not-allowed}
.ts-btn-next:not(:disabled):hover{background:#e3ff66}
.ts-btn-next.loading{opacity:.7;pointer-events:none}

/* RESULT */
.ts-result-band{
  background:var(--ink);padding:28px 28px 24px;flex-shrink:0;
  position:relative;overflow:hidden;
}
.ts-result-band::before{
  content:'';position:absolute;inset:0;opacity:.14;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 520 140' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='16' y='10' width='488' height='120' fill='none' stroke='%23d8ff3d' stroke-width='1.5'/%3E%3Cline x1='36' y1='10' x2='36' y2='130' stroke='%23d8ff3d' stroke-width='1'/%3E%3Cline x1='484' y1='10' x2='484' y2='130' stroke='%23d8ff3d' stroke-width='1'/%3E%3Cline x1='260' y1='10' x2='260' y2='130' stroke='%23d8ff3d' stroke-width='2'/%3E%3C/svg%3E") center/cover;
}
.ts-result-ey{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--primary);margin-bottom:8px;position:relative}
.ts-result-idx{
  font-family:'Unbounded',sans-serif;font-weight:900;
  font-size:72px;line-height:.9;letter-spacing:-.04em;
  color:#f4f0e8;position:relative;
}
.ts-result-idx em{color:var(--primary);font-style:normal}
.ts-result-label{
  font-family:'Unbounded',sans-serif;font-weight:800;
  font-size:16px;letter-spacing:-.02em;color:#f4f0e8;
  margin-top:10px;position:relative;line-height:1.25;
}
.ts-result-sub{font-size:12px;color:rgba(244,240,232,.65);margin-top:6px;position:relative;line-height:1.5}
.ts-result-close{
  position:absolute;top:18px;right:20px;
  background:rgba(244,240,232,.1);border:none;border-radius:50%;
  width:32px;height:32px;cursor:pointer;color:#f4f0e8;
  display:flex;align-items:center;justify-content:center;
}
.ts-result-close:hover{background:rgba(244,240,232,.2)}
.ts-result-body{padding:20px 28px 24px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:14px}
.ts-bar-wrap{background:var(--surface);border-radius:12px;padding:16px 18px}
.ts-bar-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px}
.ts-bar-track{height:10px;background:var(--line);border-radius:999px;overflow:hidden}
.ts-bar-fill{height:100%;border-radius:999px;background:var(--primary);width:0;transition:width 1s cubic-bezier(.22,1,.36,1)}
.ts-bar-scale{display:flex;justify-content:space-between;font-family:'Unbounded',sans-serif;font-size:10px;font-weight:700;color:var(--ink3);margin-top:6px}
.ts-cta{
  background:var(--primary);border-radius:14px;
  padding:18px 20px;display:flex;align-items:center;
  justify-content:space-between;gap:12px;
}
.ts-cta-text{font-size:14px;font-weight:600;color:var(--ink);line-height:1.35}
.ts-cta-sub{font-size:11px;color:var(--ink2);margin-top:3px}
.ts-cta-btn{
  font-family:'Onest',sans-serif;font-size:13px;font-weight:700;
  color:#f4f0e8;background:var(--ink);
  border:none;border-radius:999px;padding:11px 20px;
  cursor:pointer;white-space:nowrap;flex-shrink:0;
  text-decoration:none;display:inline-block;
  transition:background .15s;
}
.ts-cta-btn:hover{background:var(--ink2)}
.ts-brand{
  font-family:'Unbounded',sans-serif;font-size:12px;font-weight:800;
  color:var(--ink3);letter-spacing:-.02em;text-align:center;
  padding-bottom:4px;
}
.ts-brand span{color:var(--primary)}

/* MOBILE */
@media(max-width:540px){
  .ts-modal{max-width:100%;border-radius:20px 20px 0 0;max-height:95vh}
  .ts-overlay{align-items:flex-end;padding:0}
  .ts-header{padding:18px 20px 16px}
  .ts-body{padding:18px 20px 8px}
  .ts-footer{padding:12px 20px 20px}
  .ts-result-body{padding:16px 20px 20px}
  .ts-result-band{padding:22px 20px 20px}
  .ts-counter{font-size:22px}
  .ts-result-idx{font-size:58px}
}
</style>
</head>
<body>

<!-- TRIGGER (можно удалить если открываешь только через кнопки сайта) -->
<div style="padding:40px;text-align:center">
  <button class="ts-trigger" id="ts-open">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    Записаться на программу
  </button>
  <p style="margin-top:12px;font-size:12px;color:var(--ink3)">Займёт 2 минуты · 10 вопросов</p>
</div>

<!-- OVERLAY -->
<div class="ts-overlay" id="ts-overlay" role="dialog" aria-modal="true" aria-label="Анкета записи tenssense">
  <div class="ts-modal" id="ts-modal">
    <div id="ts-quiz-root"></div>
  </div>
</div>

<script>
(function(){
'use strict';

/* ══════════════════════════════════════════════════════
   НАСТРОЙКИ — ВСТАВЬ СВОИ ДАННЫЕ
   ══════════════════════════════════════════════════════ */
var TG_TOKEN  = 'СЮДА_ТОКЕН_БОТА';   // например: 7123456789:AAFxxxxxxx
var TG_CHAT   = 'СЮДА_CHAT_ID';      // например: -100123456789 или 123456789
/* ══════════════════════════════════════════════════════ */

var Q=[
  {id:1, text:'Какой у вас опыт в теннисе?', type:'single', score:false,
   opts:['Нулевой','Занимаюсь год','Больше двух лет']},
  {id:2, text:'Что для вас теннис?', type:'single', score:false,
   opts:['Развлечение и активный отдых','Вид искусства','Способ самопознания и самореализации']},
  {id:3, text:'Какие цели в теннисе?', type:'single', score:false,
   opts:['Научиться играть правильно и красиво','Участвовать в любительских турнирах','Стать профессиональным теннисистом']},
  {id:4, text:'Сколько вам полных лет?', type:'age', score:false},
  {id:5, text:'На скольких языках вы можете свободно говорить?', type:'single', score:true,
   opts:['Только на родном','Два языка','Три и более'], pts:[1,2,3]},
  {id:6, text:'Обучались ли какой-либо творческой деятельности?', type:'multi', score:true,
   opts:['Танцы','Музыка','Рисование'], pts:[1,1,1]},
  {id:7, text:'Занимались ли ранее каким-либо видом спорта?', type:'yesno', score:true,
   opts:['Да','Нет'], pts:[3,1]},
  {id:8, text:'В школе любили геометрию?', type:'yesno', score:true,
   opts:['Да','Нет'], pts:[3,1]},
  {id:9, text:'Что важнее для успеха в любом деле?', type:'single', score:true,
   opts:['Талант','Стремление','Трудолюбие'], pts:[1,2,3]},
  {id:10, text:'Что для вас важнее в том, чем вы занимаетесь?', type:'single', score:false,
   opts:['Процесс','Результат']},
  /* ШАГ 11 — КОНТАКТЫ */
  {id:11, text:'Осталось последнее.', type:'contact', score:false}
];

var TOTAL_STEPS = Q.length; /* 11 */
var MAX = 15;

var state = {cur:0, ans:Array(11).fill(null), multi:[]};

/* ─── ПОДСЧЁТ ─────────────────────────────────────────── */
function calcScore(){
  var s=0;
  [4,5,6,7,8].forEach(function(qi){
    var q=Q[qi], a=state.ans[qi];
    if(a===null) return;
    if(q.type==='multi'){a.forEach(function(i){s+=q.pts[i]||0});}
    else{s+=q.pts[a]||0;}
  });
  return s;
}

function getResult(pct){
  if(pct>=80) return{
    label:'Высокий индекс обучаемости',
    sub:'Быстро схватываешь новое. Прогресс будет заметен уже в первые недели.',
    cta:'Запишись — разберём твои цели и стартуем.'
  };
  if(pct>=55) return{
    label:'Хороший потенциал',
    sub:'Твёрдая основа. Нужно чуть больше времени на закрепление движений — это норма.',
    cta:'Оставь заявку — подберём формат и темп.'
  };
  return{
    label:'Осваиваешь в своём темпе',
    sub:'Программа tenssense именно под такой темп: пошагово, без суеты, с результатом.',
    cta:'Запишись на консультацию — обсудим старт.'
  };
}

/* ─── РЕНДЕР ──────────────────────────────────────────── */
function render(){
  var root = document.getElementById('ts-quiz-root');
  if(state.cur < Q.length){ renderQ(root); }
  else{ renderResult(root); }
}

function prog(){
  /* прогресс показываем до шага 11 включительно */
  return Math.round((state.cur / TOTAL_STEPS) * 100);
}

function canNext(){
  var c=state.cur, q=Q[c];
  if(q.type==='age')    return state.ans[c]!==null && String(state.ans[c]).length>0;
  if(q.type==='multi')  return state.multi.length>0;
  if(q.type==='contact') return false; /* управляется отдельно */
  return state.ans[c]!==null;
}

/* ─── РЕНДЕР ВОПРОСА ──────────────────────────────────── */
function renderQ(root){
  var q = Q[state.cur];
  var isMulti = q.type==='multi';
  var hint = isMulti ? '<p class="ts-hint">Можно выбрать несколько вариантов</p>' : '';
  var inner = '';

  if(q.type==='age'){
    inner = '<div class="ts-age-wrap">'
      +'<input class="ts-age-input" type="number" min="4" max="99" id="ts-age" placeholder="30" value="'+(state.ans[4]||'')+'">'
      +'<span class="ts-age-lbl">полных лет</span>'
      +'</div>';

  } else if(q.type==='contact'){
    inner = '<div class="ts-contact-form">'
      +'<p style="font-size:13px;color:var(--ink2);margin-bottom:4px;line-height:1.5">Введи свои данные — я отвечу лично и расскажу, что значит твой результат.</p>'
      +'<div class="ts-field-wrap">'
        +'<label class="ts-field-label" for="ts-name">Имя</label>'
        +'<input class="ts-field" id="ts-name" type="text" placeholder="Александр" autocomplete="given-name">'
        +'<span class="ts-field-err" id="ts-name-err">Введи своё имя</span>'
      +'</div>'
      +'<div class="ts-field-wrap">'
        +'<label class="ts-field-label" for="ts-contact">Телефон или Telegram</label>'
        +'<input class="ts-field" id="ts-contact" type="text" placeholder="+7 900 000-00-00 или @username" autocomplete="tel">'
        +'<span class="ts-field-err" id="ts-contact-err">Введи телефон или ник в Telegram</span>'
      +'</div>'
      +'<p class="ts-privacy">Нажимая «Узнать результат», вы соглашаетесь с <a href="https://www.tenssense.net/privacy.html" target="_blank">политикой конфиденциальности</a></p>'
      +'</div>';

  } else {
    inner += '<div class="ts-opts">';
    q.opts.forEach(function(o,i){
      var sel = isMulti ? state.multi.includes(i) : (state.ans[state.cur]===i);
      var cls = 'ts-opt'+(isMulti?' multi':'')+(sel?' selected':'');
      var mk  = sel ? '✓' : (i+1);
      inner += '<button class="'+cls+'" data-i="'+i+'" type="button">'
        +'<span class="ts-marker">'+mk+'</span>'+o+'</button>';
    });
    inner += '</div>';
  }

  var isLast  = state.cur === Q.length-1;  /* шаг 11 */
  var btnLabel = isLast ? 'Узнать результат →' : 'Далее →';
  var btnDisabled = (q.type==='contact') ? '' : (canNext() ? '' : ' disabled');

  root.innerHTML =
    '<div class="ts-progress"><div class="ts-progress-fill" style="width:'+prog()+'%"></div></div>'
    +'<div class="ts-header">'
      +'<div class="ts-header-top">'
        +'<span class="ts-eyebrow">ИНДЕКС ОБУЧАЕМОСТИ · tenssense</span>'
        +'<button class="ts-close" id="ts-close-btn" type="button" aria-label="Закрыть">'
          +'<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
        +'</button>'
      +'</div>'
      /* счётчик убран */
    +'</div>'
    +'<div class="ts-body">'
      +'<div class="ts-question">'+q.text+'</div>'
      +hint+inner
    +'</div>'
    +'<div class="ts-footer">'
      +'<button class="ts-btn-back" id="ts-back" type="button">'+(state.cur>0?'← Назад':'')+'</button>'
      +'<button class="ts-btn-next" id="ts-next" type="button"'+btnDisabled+'>'+btnLabel+'</button>'
    +'</div>';

  /* события */
  var closeBtn = document.getElementById('ts-close-btn');
  if(closeBtn) closeBtn.addEventListener('click', closeModal);

  var backBtn = document.getElementById('ts-back');
  if(backBtn && state.cur>0) backBtn.addEventListener('click', function(){ state.cur--; render(); });

  var nextBtn = document.getElementById('ts-next');
  if(nextBtn){
    if(q.type==='contact'){
      nextBtn.addEventListener('click', submitContact);
    } else {
      nextBtn.addEventListener('click', function(){
        if(q.type==='multi') state.ans[state.cur]=[].concat(state.multi);
        state.cur++;
        state.multi=[];
        render();
      });
    }
  }

  if(q.type==='age'){
    var inp = document.getElementById('ts-age');
    inp.addEventListener('input', function(){
      state.ans[4] = this.value;
      var nb = document.getElementById('ts-next');
      if(nb) nb.disabled = !this.value;
    });

  } else if(q.type==='contact'){
    /* enable кнопки по мере заполнения */
    ['ts-name','ts-contact'].forEach(function(id){
      var el = document.getElementById(id);
      if(el) el.addEventListener('input', updateContactBtn);
    });
    updateContactBtn();

  } else {
    root.querySelectorAll('.ts-opt').forEach(function(btn){
      btn.addEventListener('click', function(){
        var i = parseInt(this.dataset.i);
        if(isMulti){
          var idx = state.multi.indexOf(i);
          if(idx>-1){ state.multi.splice(idx,1); } else { state.multi.push(i); }
          state.ans[state.cur] = [].concat(state.multi);
        } else {
          state.ans[state.cur] = i;
        }
        render();
      });
    });
  }
}

function updateContactBtn(){
  var name    = (document.getElementById('ts-name')    ||{}).value||'';
  var contact = (document.getElementById('ts-contact') ||{}).value||'';
  var btn     = document.getElementById('ts-next');
  if(btn) btn.disabled = !(name.trim() && contact.trim());
}

/* ─── ВАЛИДАЦИЯ И ОТПРАВКА ────────────────────────────── */
function submitContact(){
  var nameEl    = document.getElementById('ts-name');
  var contactEl = document.getElementById('ts-contact');
  var nameErr   = document.getElementById('ts-name-err');
  var contactErr= document.getElementById('ts-contact-err');
  var ok = true;

  if(!nameEl.value.trim()){
    nameEl.classList.add('error');
    nameErr.classList.add('show');
    ok = false;
  } else {
    nameEl.classList.remove('error');
    nameErr.classList.remove('show');
  }
  if(!contactEl.value.trim()){
    contactEl.classList.add('error');
    contactErr.classList.add('show');
    ok = false;
  } else {
    contactEl.classList.remove('error');
    contactErr.classList.remove('show');
  }
  if(!ok) return;

  /* сохраняем */
  state.ans[10] = {name: nameEl.value.trim(), contact: contactEl.value.trim()};

  /* блокируем кнопку */
  var btn = document.getElementById('ts-next');
  if(btn){ btn.classList.add('loading'); btn.textContent = 'Отправляем...'; }

  sendToTelegram(function(success){
    state.cur++;
    render();
  });
}

/* ─── ОТПРАВКА В TELEGRAM ─────────────────────────────── */
function buildMessage(){
  var score = calcScore();
  var pct   = Math.round((score / MAX) * 100);
  var contact = state.ans[10] || {};

  var expOpts  = ['Нулевой','Занимаюсь год','Больше двух лет'];
  var tenOpts  = ['Развлечение и активный отдых','Вид искусства','Способ самопознания и самореализации'];
  var goalOpts = ['Научиться играть правильно и красиво','Участвовать в любительских турнирах','Стать профессиональным теннисистом'];
  var langOpts = ['Только на родном','Два языка','Три и более'];
  var creativeOpts = ['Танцы','Музыка','Рисование'];
  var successOpts  = ['Талант','Стремление','Трудолюбие'];
  var priOpts  = ['Процесс','Результат'];

  function pick(qi, opts){ return state.ans[qi]!==null ? opts[state.ans[qi]] : '—'; }
  function pickMulti(qi, opts){
    var a = state.ans[qi];
    if(!a||!a.length) return 'Не выбрано';
    return a.map(function(i){ return opts[i]; }).join(', ');
  }

  var resultLabel = pct>=80 ? 'Высокий индекс обучаемости'
                 : pct>=55 ? 'Хороший потенциал'
                 :           'Осваивает в своём темпе';

  return '🎾 *Новая заявка с сайта tenssense*\n\n'
    +'👤 *Имя:* '+contact.name+'\n'
    +'📱 *Контакт:* '+contact.contact+'\n\n'
    +'📊 *Индекс обучаемости:* '+pct+'% — '+resultLabel+'\n\n'
    +'─── Анкета ───\n'
    +'1. Опыт в теннисе: '+pick(0, expOpts)+'\n'
    +'2. Теннис — это: '+pick(1, tenOpts)+'\n'
    +'3. Цель: '+pick(2, goalOpts)+'\n'
    +'4. Возраст: '+(state.ans[4]||'—')+' лет\n'
    +'5. Языки: '+pick(4, langOpts)+'\n'
    +'6. Творчество: '+pickMulti(5, creativeOpts)+'\n'
    +'7. Спорт ранее: '+pick(6, ['Да','Нет'])+'\n'
    +'8. Любил геометрию: '+pick(7, ['Да','Нет'])+'\n'
    +'9. Успех = : '+pick(8, successOpts)+'\n'
    +'10. Важнее: '+pick(9, priOpts);
}

function sendToTelegram(cb){
  var url  = 'https://api.telegram.org/bot'+TG_TOKEN+'/sendMessage';
  var body = JSON.stringify({chat_id: TG_CHAT, text: buildMessage(), parse_mode:'Markdown'});
  fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body:body})
    .then(function(r){ return r.json(); })
    .then(function(){ cb(true); })
    .catch(function(){ cb(false); });
}

/* ─── РЕЗУЛЬТАТ ───────────────────────────────────────── */
function renderResult(root){
  var score = calcScore();
  var pct   = Math.round((score/MAX)*100);
  var r     = getResult(pct);

  var tgLinks = {0:'https://t.me/m/hSc8BrNUZjYy', 1:'https://t.me/m/DsDCLnZ5NGYy', 2:'https://t.me/m/eC7hBEnJZDEy'};
  var tgHref  = state.ans[2]!==null ? (tgLinks[state.ans[2]]||tgLinks[0]) : tgLinks[0];

  root.innerHTML =
    '<div class="ts-result-band">'
      +'<div class="ts-result-ey">РЕЗУЛЬТАТ · ИНДЕКС ОБУЧАЕМОСТИ</div>'
      +'<div class="ts-result-idx">'+pct+'<em>%</em></div>'
      +'<div class="ts-result-label">'+r.label+'</div>'
      +'<div class="ts-result-sub">'+r.sub+'</div>'
      +'<button class="ts-result-close" id="ts-rclose" type="button" aria-label="Закрыть">'
        +'<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
      +'</button>'
    +'</div>'
    +'<div class="ts-result-body">'
      +'<div class="ts-bar-wrap">'
        +'<div class="ts-bar-lbl">Индекс обучаемости</div>'
        +'<div class="ts-bar-track"><div class="ts-bar-fill" id="ts-rfill"></div></div>'
        +'<div class="ts-bar-scale"><span>0%</span><span>25%</span><span>50%</span><span>75%</span><span>100%</span></div>'
      +'</div>'
      +'<div class="ts-cta">'
        +'<div>'
          +'<div class="ts-cta-text">'+r.cta+'</div>'
          +'<div class="ts-cta-sub">Первая консультация бесплатно</div>'
        +'</div>'
        +'<a class="ts-cta-btn" href="'+tgHref+'" target="_blank" rel="noopener">В Telegram →</a>'
      +'</div>'
      +'<div class="ts-brand">tenssense<span>.</span></div>'
    +'</div>';

  setTimeout(function(){
    var f = document.getElementById('ts-rfill');
    if(f) f.style.width = pct+'%';
  },120);

  var rc = document.getElementById('ts-rclose');
  if(rc) rc.addEventListener('click', closeModal);
}

/* ─── ОТКРЫТИЕ / ЗАКРЫТИЕ ─────────────────────────────── */
function openModal(){
  state = {cur:0, ans:Array(11).fill(null), multi:[]};
  render();
  document.getElementById('ts-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(){
  document.getElementById('ts-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

/* ─── WIRE UP ──────────────────────────────────────────── */
var openBtn = document.getElementById('ts-open');
if(openBtn) openBtn.addEventListener('click', openModal);

document.getElementById('ts-overlay').addEventListener('click', function(e){
  if(e.target===this) closeModal();
});

document.addEventListener('keydown', function(e){
  if(e.key==='Escape') closeModal();
});

/* перехватываем все кнопки сайта с href="#contact" */
document.querySelectorAll('a[href="#contact"], a[href="#ts-quiz"]').forEach(function(a){
  a.addEventListener('click', function(e){
    e.preventDefault();
    openModal();
  });
});

})();
</script>
